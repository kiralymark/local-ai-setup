# -- Write to sensitive host path via mount --
- rule: Write to Sensitive Mounted Path
  desc: A container wrote to a host path it shouldn't
  condition: >
    open_write
    and container
    and (fd.name startswith /host/boot
         or fd.name startswith /host/lib/modules
         or fd.name startswith /host/usr)
  output: >
    Write to sensitive mounted host path (proc=%proc.name file=%fd.name
    container=%container.id image=%container.image.repository)
  priority: ERROR
  tags: [security, filesystem]